  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ding: 4px; margin-bottom: 18px; display: inline-flex; gap: 3px; box-shadow: 0 1px 4px rgba(0,0,0,0.06);\">\n                <sc-for list=\"{{ settingsTabItems }}\" as=\"sti\" hint-placeholder-count=\"3\">\n                  <div onclick=\"{{ sti.handler }}\" style=\"padding: 10px 20px; border-radius: 8px; cursor: pointer; background: {{ sti.bg }}; color: {{ sti.color }}; font-size: 13px; font-weight: {{ sti.fw }}; transition: all 0.15s; white-space: nowrap;\">{{ sti.label }}<\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n              <!-- PRICING -->\n              <sc-if value=\"{{ isSettingsPricing }}\" hint-placeholder-val=\"{{ true }}\">\n                <div style=\"background: #fff; border-radius: 16px; padding: 22px; box-shadow: 0 1px 4px rgba(0,0,0,0.06);\">\n                  <div style=\"font-weight: 800; color: #0A2540; font-size: 15px; margin-bottom: 18px;\">ตั้งราคาค่าเช่าตามโซน<\u002Fdiv>\n                  <div style=\"display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; margin-bottom: 20px;\">\n                    <sc-for list=\"{{ pricingZones }}\" as=\"pz\" hint-placeholder-count=\"8\">\n                      <div style=\"border: 1.5px solid #E2E8F0; border-radius: 12px; padding: 16px;\" style-hover=\"border-color: #2563EB; background: #F8FAFF;\">\n                        <div style=\"font-weight: 700; color: #0A2540; margin-bottom: 10px; font-size: 13px;\">{{ pz.zone }}<\u002Fdiv>\n                        <div style=\"display: flex; gap: 8px; align-items: center;\">\n                          <div style=\"flex: 1; background: #F8FAFF; border: 1.5px solid #E2E8F0; border-radius: 8px; padding: 9px 14px; font-size: 16px; font-weight: 800; color: #0A2540;\">{{ pz.price }}<\u002Fdiv>\n                          <div style=\"font-size: 13px; color: #64748B; white-space: nowrap;\">บาท/เดือน<\u002Fdiv>\n                        <\u002Fdiv>\n                      <\u002Fdiv>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                  <button style=\"background: #2563EB; color: #fff; border: none; border-radius: 10px; padding: 12px 24px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: 'Noto Sans Thai', sans-serif;\" style-hover=\"background: #1d4ed8;\">บันทึกการตั้งค่า<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n              <!-- USERS -->\n              <sc-if value=\"{{ isSettingsUsers }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"background: #fff; border-radius: 16px; padding: 22px; box-shadow: 0 1px 4px rgba(0,0,0,0.06);\">\n                  <div style=\"display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px;\">\n                    <div style=\"font-weight: 800; color: #0A2540; font-size: 15px;\">ผู้ใช้งานระบบ<\u002Fdiv>\n                    <button style=\"background: #2563EB; color: #fff; border: none; border-radius: 8px; padding: 8px 16px; font-size: 13px; cursor: pointer; font-family: 'Noto Sans Thai', sans-serif; font-weight: 700;\" style-hover=\"background: #1d4ed8;\">+ เพิ่มผู้ใช้<\u002Fbutton>\n                  <\u002Fdiv>\n                  <div style=\"display: flex; flex-direction: column; gap: 8px;\">\n                    <sc-for list=\"{{ systemUsers }}\" as=\"su\" hint-placeholder-count=\"4\">\n                      <div style=\"display: flex; align-items: center; gap: 14px; padding: 13px 16px; border: 1px solid #F1F5F9; border-radius: 10px; transition: background 0.1s;\" style-hover=\"background: #F8FAFF;\">\n                        <div style=\"width: 40px; height: 40px; background: {{ su.avatarBg }}; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0;\">{{ su.avatar }}<\u002Fdiv>\n                        <div style=\"flex: 1;\"><div style=\"font-weight: 700; color: #0A2540; font-size: 14px;\">{{ su.name }}<\u002Fdiv><div style=\"font-size: 12px; color: #64748B;\">{{ su.email }}<\u002Fdiv><\u002Fdiv>\n                        <span style=\"background: {{ su.roleBg }}; color: {{ su.roleColor }}; font-size: 11px; padding: 4px 12px; border-radius: 20px; font-weight: 700; flex-shrink: 0; white-space: nowrap;\">{{ su.role }}<\u002Fspan>\n                        <button style=\"background: #F1F5F9; color: #374151; border: none; border-radius: 6px; padding: 6px 12px; font-size: 12px; cursor: pointer; font-family: 'Noto Sans Thai', sans-serif; white-space: nowrap;\" style-hover=\"background: #E2E8F0;\">แก้ไข<\u002Fbutton>\n                      <\u002Fdiv>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n              <!-- STALLS -->\n              <sc-if value=\"{{ isSettingsStalls }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"background: #fff; border-radius: 16px; padding: 22px; box-shadow: 0 1px 4px rgba(0,0,0,0.06);\">\n                  <div style=\"font-weight: 800; color: #0A2540; font-size: 15px; margin-bottom: 14px;\">จัดการแผง / ล็อค<\u002Fdiv>\n                  <div style=\"background: #FFF7ED; border: 1px solid #FED7AA; border-radius: 10px; padding: 12px 16px; margin-bottom: 16px; font-size: 13px; color: #92400E; display: flex; gap: 8px; align-items: flex-start;\">\n                    <span>⚠️<\u002Fspan><span>การแก้ไขแผง/ล็อคจะมีผลต่อทั้งระบบ กรุณาตรวจสอบก่อนบันทึก<\u002Fspan>\n                  <\u002Fdiv>\n                  <div style=\"display: flex; gap: 10px; margin-bottom: 18px; flex-wrap: wrap;\">\n                    <button style=\"background: #2563EB; color: #fff; border: none; border-radius: 8px; padding: 10px 18px; font-size: 13px; cursor: pointer; font-family: 'Noto Sans Thai', sans-serif; font-weight: 700;\" style-hover=\"background: #1d4ed8;\">+ เพิ่มโซนใหม่<\u002Fbutton>\n                    <button style=\"background: #F1F5F9; color: #374151; border: none; border-radius: 8px; padding: 10px 18px; font-size: 13px; cursor: pointer; font-family: 'Noto Sans Thai', sans-serif;\" style-hover=\"background: #E2E8F0;\">+ เพิ่มล็อค<\u002Fbutton>\n                  <\u002Fdiv>\n                  <div style=\"display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;\">\n                    <sc-for list=\"{{ zoneSettingCards }}\" as=\"zsc\" hint-placeholder-count=\"8\">\n                      <div style=\"border: 1.5px solid #E2E8F0; border-radius: 12px; padding: 16px; text-align: center; cursor: pointer; transition: all 0.15s;\" style-hover=\"border-color: #2563EB; background: #F8FAFF;\">\n                        <div style=\"font-weight: 800; color: #0A2540; font-size: 22px; margin-bottom: 5px;\">{{ zsc.zone }}<\u002Fdiv>\n                        <div style=\"font-size: 12px; color: #64748B; margin-bottom: 8px;\">{{ zsc.name }}<\u002Fdiv>\n                        <div style=\"font-size: 24px; font-weight: 800; color: #374151;\">{{ zsc.count }}<\u002Fdiv>\n                        <div style=\"font-size: 11px; color: #94A3B8; margin-bottom: 10px;\">ล็อค<\u002Fdiv>\n                        <button style=\"background: #F1F5F9; color: #374151; border: none; border-radius: 6px; padding: 6px 12px; font-size: 11px; cursor: pointer; font-family: 'Noto Sans Thai', sans-serif; width: 100%;\" style-hover=\"background: #E2E8F0;\">แก้ไข<\u002Fbutton>\n                      <\u002Fdiv>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===== STALL MODAL ===== -->\n  <sc-if value=\"{{ showStallModal }}\" hint-placeholder-val=\"{{ false }}\">\n    <div onclick=\"{{ closeStallModal }}\" style=\"position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 200; animation: fadeUp 0.2s ease;\">\n      <div onclick=\"{{ stopPropagation }}\" style=\"background: #fff; border-radius: 20px; padding: 26px; max-width: 400px; width: 90%; box-shadow: 0 24px 70px rgba(0,0,0,0.22); animation: popIn 0.2s ease;\">\n        <div style=\"display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 18px;\">\n          <div>\n            <div style=\"font-size: 26px; font-weight: 800; color: #0A2540; line-height: 1;\">{{ stallModalId }}<\u002Fdiv>\n            <div style=\"font-size: 13px; color: #64748B; margin-top: 3px;\">{{ currentZoneName }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display: flex; align-items: center; gap: 8px;\">\n            <span style=\"background: {{ stallModalStatusBg }}; color: {{ stallModalStatusColor }}; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 800;\">{{ stallModalStatusLabel }}<\u002Fspan>\n            <div onclick=\"{{ closeStallModal }}\" style=\"width: 30px; height: 30px; background: #F1F5F9; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 14px; color: #64748B;\" style-hover=\"background: #E2E8F0;\">✕<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background: #F8FAFF; border-radius: 12px; padding: 14px; margin-bottom: 16px; font-size: 14px; display: flex; flex-direction: column; gap: 10px;\">\n          <div style=\"display: flex; justify-content: space-between;\"><span style=\"color: #64748B;\">ราคาค่าเช่า<\u002Fspan><span style=\"font-weight: 800; color: #2563EB;\">{{ stallModalPrice }} บาท/เดือน<\u002Fspan><\u002Fdiv>\n          <div style=\"border-top: 1px solid #E2E8F0; padding-top: 10px; display: flex; justify-content: space-between;\"><span style=\"color: #64748B;\">ร้านค้า<\u002Fspan><span style=\"font-weight: 700; color: #0A2540;\">{{ stallModalShopName }}<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display: flex; gap: 8px;\">\n          <button onclick=\"{{ closeStallModal }}\" style=\"flex: 1; background: #F1F5F9; color: #374151; border: none; border-radius: 10px; padding: 12px; font-size: 14px; cursor: pointer; font-family: 'Noto Sans Thai', sans-serif; font-weight: 600;\" style-hover=\"background: #E2E8F0;\">ปิด<\u002Fbutton>\n          <button style=\"flex: 1; background: #2563EB; color: #fff; border: none; border-radius: 10px; padding: 12px; font-size: 14px; cursor: pointer; font-family: 'Noto Sans Thai', sans-serif; font-weight: 700;\" style-hover=\"background: #1d4ed8;\">ดูรายละเอียด<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    mode: 'overview',\n    loaScreen: 'home',\n    crmPage: 'dashboard',\n    selectedZone: 'A',\n    selectedStall: null,\n    showStallModal: false,\n    repairDept: 'building',\n    settingsTab: 'pricing',\n    shopFilter: 'all',\n    ticketFilter: 'all',\n    bookingConfirmed: false,\n    confirmedStallId: null,\n    confirmedZone: null,\n    repairSubmitted: false,\n  };\n\n  ZONES = ['A','B','C','D','E','F','G','H'];\n  ZONE_NAMES = { A:'โซน A - อาหารสด', B:'โซน B - อาหารปรุง', C:'โซน C - ขนมหวาน', D:'โซน D - เสื้อผ้า', E:'โซน E - ของใช้', F:'โซน F - ผักผลไม้', G:'โซน G - อาหารทะเล', H:'โซน H - อาคารพาณิชย์' };\n  ZONE_ICONS = { A:'🥬', B:'🍜', C:'🍰', D:'👗', E:'🏠', F:'🍎', G:'🦐', H:'🏢' };\n  SHOP_NAMES = ['ร้านผักสด','ร้านขนมไทย','ร้านอาหารทะเล','ร้านเสื้อผ้า','ร้านของใช้','ร้านผลไม้','ร้านก๋วยเตี๋ยว','ร้านข้าวแกง','ร้านเนื้อสัตว์','ร้านเครื่องเทศ'];\n\n  stallStatus(zone, num) {\n    const seed = (zone.charCodeAt(0) * 17 + num * 7) % 10;\n    if (seed < 6) return 'occupied';\n    if (seed < 8) return 'available';\n    return 'reserved';\n  }\n  stallBg(status) { return status === 'available' ? '#22C55E' : status === 'reserved' ? '#F59E0B' : '#94A3B8'; }\n  stallStatusLabel(status) { return status === 'available' ? '● ว่าง' : status === 'reserved' ? '● จองแล้ว' : '● ไม่ว่าง'; }\n  stallStatusBg(status) { return status === 'available' ? '#ECFDF5' : status === 'reserved' ? '#FFFBEB' : '#F1F5F9'; }\n  stallStatusColor(status) { return status === 'available' ? '#065F46' : status === 'reserved' ? '#92400E' : '#374151'; }\n\n  getZoneStalls(zone) {\n    return Array.from({length: 24}, (_, i) => {\n      const num = i + 1;\n      const status = this.stallStatus(zone, num);\n      const price = zone <= 'D' ? 3500 : 2800;\n      const shopName = status === 'occupied' ? this.SHOP_NAMES[(zone.charCodeAt(0) + num) % this.SHOP_NAMES.length] : null;\n      return { id: `${zone}${String(num).padStart(2,'0')}`, num, status, price, shopName, bgColor: this.stallBg(status), cursor: status !== 'occupied' ? 'pointer' : 'default' };\n    });\n  }\n\n  getShops() {\n    return [\n      {id:'R001', zone:'A', stall:'A01', name:'ร้านผักสด สุขใจ', type:'ขาประจำ', owner:'นาง สมหญิง ใจดี', phone:'081-234-5678', products:'ผัก, สมุนไพร'},\n      {id:'R002', zone:'A', stall:'A02', name:'ร้านอาหารทะเลสด', type:'สัญญาเช่ารายปี', owner:'นาย ประสิทธิ์ มั่งมี', phone:'082-345-6789', products:'ปลา, กุ้ง, หอย'},\n      {id:'R003', zone:'B', stall:'B03', name:'ร้านก๋วยเตี๋ยวเรือ', type:'ขาประจำ', owner:'นาย วิชัย ขยัน', phone:'083-456-7890', products:'ก๋วยเตี๋ยว, บะหมี่'},\n      {id:'R004', zone:'C', stall:'C05', name:'ร้านขนมไทยโบราณ', type:'ขาประจำ', owner:'นาง มาลี สวยงาม', phone:'084-567-8901', products:'ขนมไทย, ของหวาน'},\n      {id:'R005', zone:'D', stall:'D08', name:'ร้านเสื้อผ้าแฟชั่น', type:'สัญญาเช่ารายปี', owner:'นางสาว อนุสรา ชิค', phone:'085-678-9012', products:'เสื้อผ้า, กระเป๋า'},\n      {id:'R006', zone:'H', stall:'H01', name:'ร้านโชห่วยมงคล', type:'อาคารพาณิชย์', owner:'นาย มงคล ร่ำรวย', phone:'086-789-0123', products:'ของชำ, เครื่องดื่ม'},\n      {id:'R007', zone:'E', stall:'E12', name:'ร้านของใช้ในบ้าน', type:'ขาประจำ', owner:'นาง สุภา ใส่ใจ', phone:'087-890-1234', products:'ของใช้, เครื่องครัว'},\n      {id:'R008', zone:'F', stall:'F07', name:'ร้านผลไม้นานาชนิด', type:'ขาประจำ', owner:'นาย สวรรค์ หวาน', phone:'088-901-2345', products:'ผลไม้สด, น้ำผลไม้'},\n    ];\n  }\n\n  getTickets() {\n    return [\n      {id:'TK001', zone:'A', stall:'A03', shopName:'ร้านเนื้อย่าง', type:'อาคารสถานที่', issue:'หลังคารั่ว น้ำหยดลงมาที่แผงขาย', status:'pending', created:'5 ก.ค. 69', assignee:''},\n      {id:'TK002', zone:'B', stall:'B11', shopName:'ร้านข้าวแกง', type:'การตลาด', issue:'ป้ายชื่อร้านชำรุด ต้องการเปลี่ยนใหม่', status:'in-progress', created:'4 ก.ค. 69', assignee:'ฝ่ายการตลาด'},\n      {id:'TK003', zone:'C', stall:'C02', shopName:'ร้านขนมปัง', type:'อาคารสถานที่', issue:'ท่อระบายน้ำอุดตัน', status:'done', created:'1 ก.ค. 69', assignee:'งานอาคาร'},\n      {id:'TK004', zone:'F', stall:'F15', shopName:'ร้านมะม่วง', type:'อาคารสถานที่', issue:'ไฟฟ้าขัดข้อง สายไฟเสียหาย', status:'pending', created:'6 ก.ค. 69', assignee:''},\n      {id:'TK005', zone:'H', stall:'H03', shopName:'ร้านโชห่วย', type:'การตลาด', issue:'ขอข้อมูลการจัดงาน Promotion', status:'in-progress', created:'3 ก.ค. 69', assignee:'ฝ่ายการตลาด'},\n    ];\n  }\n\n  typeStyle(type) {\n    if (type === 'ขาประจำ') return {bg:'#EFF6FF', color:'#1D4ED8'};\n    if (type === 'สัญญาเช่ารายปี') return {bg:'#F0FDF4', color:'#166534'};\n    return {bg:'#FFF7ED', color:'#92400E'};\n  }\n\n  ticketStyle(status) {\n    if (status === 'pending') return {bg:'#FEF2F2', color:'#DC2626', label:'● รอดำเนินการ', border:'#EF4444', bg2:'#EF4444'};\n    if (status === 'in-progress') return {bg:'#FFFBEB', color:'#D97706', label:'● กำลังดำเนินการ', border:'#F59E0B', bg2:'#F59E0B'};\n    return {bg:'#ECFDF5', color:'#059669', label:'● เสร็จสิ้น', border:'#22C55E', bg2:'#22C55E'};\n  }\n\n  navStyle(active) {\n    return { bg: active ? 'rgba(255,255,255,0.15)' : 'transparent', color: active ? '#fff' : 'rgba(255,255,255,0.6)', fontWeight: active ? '700' : '400' };\n  }\n\n  renderVals() {\n    const {mode, loaScreen, crmPage, selectedZone, selectedStall, showStallModal, repairDept, settingsTab, shopFilter, ticketFilter} = this.state;\n\n    const allStalls = this.getZoneStalls(selectedZone);\n    const allShops = this.getShops();\n    const allTickets = this.getTickets();\n    const filtShops = shopFilter === 'all' ? allShops : allShops.filter(s => s.type === shopFilter);\n    const filtTickets = ticketFilter === 'all' ? allTickets : allTickets.filter(t => t.status === ticketFilter);\n    const stallData = selectedStall ? allStalls.find(s => s.id === selectedStall) : null;\n\n    const zoneAvail = allStalls.filter(s => s.status === 'available').length;\n    const zoneOccup = allStalls.filter(s => s.status === 'occupied').length;\n    const zoneResv = allStalls.filter(s => s.status === 'reserved').length;\n\n    const {bookingConfirmed, confirmedStallId, confirmedZone, repairSubmitted} = this.state;\n    const isLBooking = ['booking','booking-map','booking-confirm'].includes(loaScreen);\n    const isLRepair = ['repair','repair2'].includes(loaScreen);\n\n    const pageTitles = {\n      dashboard:['Dashboard','ภาพรวมระบบตลาดเพชรอารี'],\n      zones:['แผนผังล็อค','แผนผังโซนและล็อคทั้งหมด — คลิกล็อคเพื่อดูราคา'],\n      shops:['ข้อมูลร้านค้า','ร้านค้าทั้งหมดในตลาดเพชรอารี'],\n      tickets:['งานแจ้งซ่อม','รายการแจ้งซ่อมจากร้านค้า'],\n      reports:['รายงาน','รายงานสรุปประจำเดือน กรกฎาคม 2569'],\n      settings:['ตั้งค่า','ตั้งค่าระบบและผู้ใช้งาน'],\n    };\n\n    return {\n      isOverview: mode === 'overview',\n      isLoa: mode === 'loa',\n      isCrm: mode === 'crm',\n      goOverview: () => this.setState({mode:'overview'}),\n      goLoa: () => this.setState({mode:'loa'}),\n      goCrm: () => this.setState({mode:'crm'}),\n\n      // LOA booleans\n      isLoaHome: loaScreen === 'home',\n      isLoaProfile: loaScreen === 'profile',\n      isLoaBooking: loaScreen === 'booking',\n      isLoaBookingMap: loaScreen === 'booking-map',\n      isLoaBookingConfirm: loaScreen === 'booking-confirm',\n      isLoaRepair: loaScreen === 'repair',\n      isLoaRepair2: loaScreen === 'repair2',\n      isLoaContact: loaScreen === 'contact',\n      showBackBtn: loaScreen !== 'home',\n\n      // LOA navigation handlers\n      goLoaHome: () => this.setState({loaScreen:'home'}),\n      goLoaProfile: () => this.setState({loaScreen:'profile'}),\n      goLoaBooking: () => this.setState({loaScreen:'booking'}),\n      goLoaBookingMap: () => this.setState({loaScreen:'booking-map'}),\n      goLoaBookingConfirm: () => this.setState({loaScreen:'booking-confirm'}),\n      goLoaRepair: () => this.setState({loaScreen:'repair'}),\n      goLoaRepair2Building: () => this.setState({loaScreen:'repair2', repairDept:'building'}),\n      goLoaRepair2Marketing: () => this.setState({loaScreen:'repair2', repairDept:'marketing'}),\n      goLoaContact: () => this.setState({loaScreen:'contact'}),\n      confirmBooking: () => this.setState({\n        loaScreen: 'home',\n        bookingConfirmed: true,\n        confirmedStallId: this.state.selectedStall,\n        confirmedZone: this.state.selectedZone,\n      }),\n      submitRepair: () => this.setState({loaScreen:'home', repairSubmitted: true}),\n\n      // LOA nav panel items\n      loaNavItems: [\n        {icon:'🏠', label:'หน้าหลัก', screen:'home', handler:() => this.setState({loaScreen:'home'})},\n        {icon:'👤', label:'โปรไฟล์ร้านค้า', screen:'profile', handler:() => this.setState({loaScreen:'profile'})},\n        {icon:'📍', label:'จองแผง: เลือกโซน', screen:'booking', handler:() => this.setState({loaScreen:'booking'})},\n        {icon:'🗺️', label:'จองแผง: แผนผัง', screen:'booking-map', handler:() => this.setState({loaScreen:'booking-map'})},\n        {icon:'✅', label:'จองแผง: ยืนยัน', screen:'booking-confirm', handler:() => this.setState({loaScreen:'booking-confirm'})},\n        {icon:'🔧', label:'แจ้งซ่อม: หน่วยงาน', screen:'repair', handler:() => this.setState({loaScreen:'repair'})},\n        {icon:'📝', label:'แจ้งซ่อม: ฟอร์ม', screen:'repair2', handler:() => this.setState(
